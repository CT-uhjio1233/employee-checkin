<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>員工打卡系統 — 模組版</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-base: #060a10;
    --bg-elevated: #0c1018;
    --bg-card: #111722;
    --bg-card-alt: #151c2a;
    --bg-input: #0a0f18;
    --border: #1a2236;
    --border-active: #2d6cdf;
    --accent: #2d6cdf;
    --accent-bright: #4d8ef7;
    --accent-glow: rgba(45, 108, 223, 0.2);
    --accent-glow-strong: rgba(45, 108, 223, 0.35);
    --success: #10b981;
    --success-dim: rgba(16, 185, 129, 0.12);
    --warning: #f59e0b;
    --warning-dim: rgba(245, 158, 11, 0.1);
    --error: #ef4444;
    --error-dim: rgba(239, 68, 68, 0.1);
    --text-1: #e4e9f2;
    --text-2: #8494ad;
    --text-3: #4a5975;
    --radius-lg: 16px;
    --radius: 12px;
    --radius-sm: 8px;
    --font-body: 'Noto Sans TC', system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
    --ease: cubic-bezier(0.22, 1, 0.36, 1);
  }

  html { font-size: 16px; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font-body);
    background: var(--bg-base);
    color: var(--text-1);
    min-height: 100dvh;
    overflow-x: hidden;
  }

  body::before {
    content: ''; position: fixed; inset: 0;
    background: radial-gradient(ellipse 600px 400px at 20% 10%, rgba(45,108,223,0.06), transparent),
                radial-gradient(ellipse 500px 500px at 80% 90%, rgba(16,185,129,0.04), transparent);
    pointer-events: none; z-index: 0;
  }

  /* ===== Network Banner ===== */
  .net-banner {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 9999;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 7px 16px; font-size: 0.76rem; font-weight: 600;
    transition: transform 0.45s var(--ease), background 0.3s;
    transform: translateY(-100%);
  }
  .net-banner.online { background: rgba(16,185,129,0.15); color: #6ee7b7; transform: translateY(0); }
  .net-banner.offline { background: rgba(239,68,68,0.2); color: #fca5a5; transform: translateY(0); }

  /* ===== Layout Shell ===== */
  .shell {
    position: relative; z-index: 1;
    width: 100%; max-width: 480px; margin: 0 auto;
    padding: 20px 18px 48px; min-height: 100dvh;
  }

  /* ===== Header ===== */
  .hdr { text-align: center; padding: 28px 0 24px; }
  .hdr-logo {
    width: 56px; height: 56px; border-radius: 18px;
    background: linear-gradient(135deg, var(--accent), #1d4ed8);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 26px; box-shadow: 0 8px 40px var(--accent-glow);
    margin-bottom: 14px;
  }
  .hdr h1 { font-size: 1.45rem; font-weight: 900; }
  .hdr .sub { font-size: 0.78rem; color: var(--text-2); margin-top: 3px; }

  /* ===== Card ===== */
  .card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-lg); padding: 22px; margin-bottom: 14px;
  }
  .card-label {
    font-size: 0.7rem; font-weight: 600; color: var(--text-2);
    text-transform: uppercase; margin-bottom: 16px;
    display: flex; align-items: center; gap: 7px;
  }
  .card-label i { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); display: inline-block; }

  /* ===== Buttons ===== */
  .btn {
    width: 100%; padding: 15px; border: none; border-radius: var(--radius);
    font-family: var(--font-body); font-size: 0.98rem; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
    transition: transform 0.18s, box-shadow 0.25s, opacity 0.2s;
  }
  .btn:active:not(:disabled) { transform: scale(0.985); }
  .btn:disabled { cursor: not-allowed; opacity: 0.55; filter: saturate(0.5); }
  .btn-primary {
    color: #fff; background: linear-gradient(135deg, var(--accent), #1d4ed8);
    box-shadow: 0 4px 28px var(--accent-glow);
  }
  .btn-primary:hover:not(:disabled) { box-shadow: 0 8px 36px var(--accent-glow-strong); }

  /* ===== Spinner ===== */
  .spinner {
    display: none; width: 18px; height: 18px;
    border: 2.5px solid rgba(255,255,255,0.25);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.65s linear infinite;
  }
  .loading .spinner { display: block; }

  /* ===== Alert ===== */
  .alert {
    padding: 13px 16px; border-radius: var(--radius);
    font-size: 0.84rem; line-height: 1.65; display: none; margin-top: 12px;
  }
  .alert.show { display: block; animation: fadeUp 0.35s var(--ease); }
  .alert-error { background: var(--error-dim); border: 1px solid rgba(239,68,68,0.22); color: #fca5a5; }
  .alert-success { background: var(--success-dim); border: 1px solid rgba(16,185,129,0.18); color: #6ee7b7; }
  .alert-warning { background: var(--warning-dim); border: 1px solid rgba(245,158,11,0.18); color: #fcd34d; }

  /* ===== Live Clock ===== */
  .clock-block { text-align: center; padding: 14px 0 6px; }
  .clock-block .ck-time {
    font-family: var(--font-mono); font-size: 2.8rem; font-weight: 600;
    background: linear-gradient(135deg, var(--text-1), var(--text-2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .clock-block .ck-date { font-size: 0.78rem; color: var(--text-2); margin-top: 2px; }

  /* ===== Map Container ===== */
  .map-wrap {
    width: 100%; height: 220px; border-radius: var(--radius);
    overflow: hidden; border: 1px solid var(--border); margin-top: 14px;
    background: var(--bg-input); display: none;
  }
  .map-wrap.show { display: block; animation: fadeUp 0.4s var(--ease); }
  #mapCanvas { width: 100%; height: 100%; }

  /* ===== Distance Ribbon ===== */
  .dist-ribbon {
    display: none; align-items: center; justify-content: space-between;
    padding: 12px 16px; border-radius: var(--radius); margin-top: 12px; font-size: 0.82rem;
  }
  .dist-ribbon.show { display: flex; animation: fadeUp 0.35s var(--ease); }
  .dist-ribbon.in-range { background: var(--success-dim); border: 1px solid rgba(16,185,129,0.18); color: #6ee7b7; }
  .dist-ribbon.out-range { background: var(--warning-dim); border: 1px solid rgba(245,158,11,0.18); color: #fcd34d; }
  .dist-ribbon .dist-val { font-family: var(--font-mono); font-weight: 600; font-size: 0.9rem; }

  /* ===== Animations ===== */
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="net-banner" id="netBanner">
  <span id="netLabel">偵測中...</span>
</div>

<div class="shell">
  <div id="viewMain">
    <div class="hdr" style="padding-bottom:12px;">
      <div class="hdr-logo">📍</div>
      <h1>行動打卡模組</h1>
      <p class="sub">GPS 定位 ・ 座標拋轉</p>
    </div>

    <div class="clock-block">
      <div class="ck-time" id="ckTime">--:--:--</div>
      <div class="ck-date" id="ckDate">----/--/--</div>
    </div>

    <div class="card">
      <div class="card-label"><i></i>打卡操作區</div>
      <button class="btn btn-primary" id="btnCheckin">
        <span class="spinner" id="checkinSpinner"></span>
        <span id="checkinBtnText">📍 進行打卡</span>
      </button>

      <div class="alert" id="checkinAlert"></div>

      <div class="dist-ribbon" id="distRibbon">
        <span id="distLabel">距離企業中心點</span>
        <span class="dist-val" id="distVal">— m</span>
      </div>

      <div class="map-wrap" id="mapWrap">
        <div id="mapCanvas"></div>
      </div>
    </div>
  </div>
</div>

<script>
  (function(){
    var s = document.createElement('script');
    s.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyDgwvSSgGyge5fPdHW0p8aauiG4dG3zIyw&callback=__gmReady';
    s.async = true; s.defer = true;
    document.head.appendChild(s);
  })();
  var __gmLoaded = false;
  function __gmReady() { __gmLoaded = true; }
</script>

<script>
(function () {
  'use strict';

  // ============================================================
  // 1. SYSTEM CONFIGURATION
  // ============================================================
  var OFFICE_LAT = 24.349199168445217;
  var OFFICE_LNG = 120.64796717378222;
  var GEOFENCE_RADIUS_M = 500;

  // ============================================================
  // 2. DOM REFERENCES
  // ============================================================
  var $ = function (id) { return document.getElementById(id); };
  var ckTime     = $('ckTime');
  var ckDate     = $('ckDate');
  var btnCheckin = $('btnCheckin');
  var checkinBtnText = $('checkinBtnText');
  var checkinAlert   = $('checkinAlert');
  var distRibbon = $('distRibbon');
  var distVal    = $('distVal');
  var mapWrap    = $('mapWrap');
  var netBanner  = $('netBanner');
  var netLabel   = $('netLabel');
  var mapInstance = null;
  var mapMarkers  = [];

  // ============================================================
  // 3. UTILITIES
  // ============================================================
  function haversineMeters(lat1, lon1, lat2, lon2) {
    var R = 6371000;
    var toRad = function (deg) { return deg * Math.PI / 180; };
    var dLat = toRad(lat2 - lat1);
    var dLon = toRad(lon2 - lon1);
    var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
    var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c;
  }

  // ============================================================
  // 4. EXTERNAL APP INTEGRATION BRIDGE
  // ============================================================
  function dispatchToApp(payload) {
    console.log("正在將資料拋轉至外部 APP:", payload);
    
    // 預留給 React Native WebView 等框架的拋轉介面
    if (window.ReactNativeWebView) {
        window.ReactNativeWebView.postMessage(JSON.stringify(payload));
    }
    // 其他框架可依需求在此擴充
  }

  // ============================================================
  // 5. UI COMPONENTS
  // ============================================================
  function tickClock() {
    var now = new Date();
    var p = function (n) { return String(n).padStart(2, '0'); };
    ckTime.textContent = p(now.getHours()) + ':' + p(now.getMinutes()) + ':' + p(now.getSeconds());
    var wk = ['日','一','二','三','四','五','六'];
    ckDate.textContent = now.getFullYear() + '/' + p(now.getMonth()+1) + '/' + p(now.getDate()) + '　星期' + wk[now.getDay()];
  }
  tickClock(); setInterval(tickClock, 1000);

  function showAlert(type, html) {
    checkinAlert.className = 'alert show alert-' + type;
    checkinAlert.innerHTML = html;
  }

  function showDistance(meters) {
    distRibbon.classList.add('show');
    var inRange = meters <= GEOFENCE_RADIUS_M;
    distRibbon.classList.remove('in-range', 'out-range');
    distRibbon.classList.add(inRange ? 'in-range' : 'out-range');
    distVal.textContent = (meters / 1000).toFixed(2) + ' km';
  }

  function renderMap(userLat, userLng) {
    if (!__gmLoaded) return;
    mapWrap.classList.add('show');
    var center = { lat: (userLat + OFFICE_LAT) / 2, lng: (userLng + OFFICE_LNG) / 2 };

    if (!mapInstance) {
      mapInstance = new google.maps.Map(document.getElementById('mapCanvas'), {
        center: center, zoom: 15, disableDefaultUI: true, zoomControl: true,
        styles: [
          { elementType: 'geometry', stylers: [{ color: '#0f1722' }] },
          { elementType: 'labels.text.stroke', stylers: [{ color: '#0f1722' }] },
          { elementType: 'labels.text.fill', stylers: [{ color: '#5a6e8a' }] },
          { featureType: 'road', elementType: 'geometry', stylers: [{ color: '#1a2740' }] },
          { featureType: 'water', elementType: 'geometry', stylers: [{ color: '#080d14' }] }
        ]
      });
    } else { mapInstance.setCenter(center); }

    mapMarkers.forEach(function (m) { m.setMap(null); });
    mapMarkers = [];

    mapMarkers.push(new google.maps.Marker({
      position: { lat: OFFICE_LAT, lng: OFFICE_LNG }, map: mapInstance, label: { text: '🏢', fontSize: '22px' }, icon: { path: 0, scale: 0 }
    }));
    mapMarkers.push(new google.maps.Marker({
      position: { lat: userLat, lng: userLng }, map: mapInstance, label: { text: '📍', fontSize: '22px' }, icon: { path: 0, scale: 0 }
    }));
    mapMarkers.push(new google.maps.Circle({
      strokeColor: '#2d6cdf', strokeOpacity: 0.4, strokeWeight: 1.5, fillColor: '#2d6cdf', fillOpacity: 0.08,
      map: mapInstance, center: { lat: OFFICE_LAT, lng: OFFICE_LNG }, radius: GEOFENCE_RADIUS_M
    }));

    var bounds = new google.maps.LatLngBounds();
    bounds.extend({ lat: userLat, lng: userLng });
    bounds.extend({ lat: OFFICE_LAT, lng: OFFICE_LNG });
    mapInstance.fitBounds(bounds, 40);
  }

  // ============================================================
  // 6. CHECK-IN LOGIC
  // ============================================================
  btnCheckin.addEventListener('click', function () {
    if (!navigator.geolocation) {
      showAlert('error', '⚠️ 設備不支援定位功能。');
      return;
    }

    btnCheckin.disabled = true;
    btnCheckin.classList.add('loading');
    checkinBtnText.textContent = '定位擷取中...';
    checkinAlert.className = 'alert';
    distRibbon.className = 'dist-ribbon';
    mapWrap.classList.remove('show');

    navigator.geolocation.getCurrentPosition(
      function (pos) {
        var lat = pos.coords.latitude;
        var lng = pos.coords.longitude;
        var distM = haversineMeters(lat, lng, OFFICE_LAT, OFFICE_LNG);

        // 顯示結果與地圖 (保留 UI 呈現)
        showDistance(distM);
        renderMap(lat, lng);

        // 僅包含經緯度之資料結構
        var payload = {
          latitude: lat,
          longitude: lng
        };

        // 拋轉資料至外部系統
        dispatchToApp(payload);

        showAlert('success', '✅ 打卡座標擷取成功並已傳送至應用程式。<br><span style="font-size:0.8em;opacity:0.8">經緯度: ' + lat.toFixed(5) + ', ' + lng.toFixed(5) + '</span>');

        btnCheckin.disabled = false;
        btnCheckin.classList.remove('loading');
        checkinBtnText.textContent = '📍 重新打卡';
      },
      function (err) {
        showAlert('error', '⚠️ 定位失敗，請確認設備權限。');
        btnCheckin.disabled = false;
        btnCheckin.classList.remove('loading');
        checkinBtnText.textContent = '📍 進行打卡';
      },
      { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
    );
  });

  // ============================================================
  // 7. NETWORK MONITORING
  // ============================================================
  function updateNetStatus() {
    var online = navigator.onLine;
    netBanner.className = 'net-banner ' + (online ? 'online' : 'offline');
    netLabel.textContent = online ? '網路連線正常' : '目前處於離線狀態';
    if (online) setTimeout(function () { if (navigator.onLine) netBanner.className = 'net-banner'; }, 3000);
  }
  window.addEventListener('online', updateNetStatus);
  window.addEventListener('offline', updateNetStatus);
  updateNetStatus();

})();
</script>
</body>
</html>
